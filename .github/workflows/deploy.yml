# Tek seferlik depo ayarı: Settings > Pages > Source, "GitHub Actions" olmalıdır.
name: Doğrula ve GitHub Pages'e Yayınla

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v7

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Test bağımlılıklarını kur
        run: python -m pip install -r requirements-dev.txt

      - name: İndeksleri üret
        run: python generate_index.py

      - name: Python testlerini çalıştır
        run: python -m pytest -p no:cacheprovider -q

      - name: JavaScript sözdizimini doğrula
        run: |
          node --check app.js
          node --check analytics.js

      - name: JSON çıktılarını doğrula
        run: |
          python -m json.tool index.json > /dev/null
          python -m json.tool search-index.json > /dev/null

      - name: GitHub Pages'i yapılandır
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Pages artifact'ını yükle
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pages'e yayınla
        id: deployment
        uses: actions/deploy-pages@v5
